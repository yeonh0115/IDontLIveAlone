spring.application.name=smart_door_security_server

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 리전 지연 속도를 감안하여 SSL을 명확히 끄고 타임존을 UTC로 간소화합니다.
# 1. DB 연결 URL 설정 (주인, 포트, 데이터베이스 이름 반영)
spring.datasource.url=jdbc:mysql://idontlivealone-c7340c.db.pandastack.app:3306/mysql?serverTimezone=Asia/Seoul&characterEncoding=UTF-8

# 2. 사용자 이름 및 비밀번호 설정 (뿌리 = root)
spring.datasource.username=root
spring.datasource.password=T6ZbVuSDpqgEXTp1I8yTooCc
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA 테이블 자동 생성 및 SQL 로그 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 💡 핵심 수정: DB 연결 시도 시간을 최대 30초(30000ms)로 늘려 물리적 거리를 극복합니다.
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# DB 연결 실패 시 서버 구동을 아예 실패(종료)시켜버림
spring.datasource.continue-on-error=false

# 외부 요청 수신 및 플랫폼 포트 강제 바인딩
server.port=${PORT:8080}
server.address=0.0.0.0

# 파일 및 요청 용량 설정
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# 테이블 구조 자동 업데이트
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
