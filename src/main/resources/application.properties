# ===================================================================
# 1. 애플리케이션 기본 설정
# ===================================================================
spring.application.name=smart_door_security_server

# Clever Cloud 플랫폼 포트 자동 바인딩 (환경변수 PORT가 없으면 8080 사용)
server.port=${PORT:8080}
server.address=0.0.0.0

# 파일 및 요청 용량 설정
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB


# ===================================================================
# 2. 데이터베이스(Database) 및 히카리CP(HikariCP) 설정 (Clever Cloud 반영)
# ===================================================================

# Clever Cloud MySQL 호스트 및 데이터베이스 이름 반영
spring.datasource.url=jdbc:mysql://b12apnpvcq4tb5jrvfib-mysql.services.clever-cloud.com:3306/b12apnpvcq4tb5jrvfib?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=uydii7ftcvdiadej
spring.datasource.password=Oogc7qFCdtErlRMkLfDI
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# DB 연결 시도 시간을 최대 30초(30000ms)로 지정
spring.datasource.hikari.connection-timeout=30000

# DB 연결 실패 시 서버 구동을 아예 실패(종료)시켜 에러 추적 용이하게 변경
spring.datasource.continue-on-error=false


# ===================================================================
# 3. JPA / 하이버네이트(Hibernate) 설정
# ===================================================================
# 테이블 구조 자동 업데이트
spring.jpa.hibernate.ddl-auto=update

# SQL 실행 로그 및 포맷팅 설정
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
