# ===================================================================
# 1. 애플리케이션 기본 설정
# ===================================================================
spring.application.name=smart_door_security_server

# Render 플랫폼 포트 자동 바인딩 (환경변수 PORT가 없으면 8080 사용)
server.port=${PORT:8080}
server.address=0.0.0.0

# 파일 및 요청 용량 설정
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# Spring MVC 비동기 타임아웃 설정 (밀리초 단위, -1은 무제한)
spring.mvc.async.request-timeout=-1

# 정적 리소스(이미지 등)를 외부 브라우저에서 곧바로 주소창에 입력해 볼 수 있게 허용하는 옵션
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/


# ===================================================================
# 2. 데이터베이스(Database) 및 히카리CP(HikariCP) 설정 (Aiven MySQL 보안 반영)
# ===================================================================

# 환경변수 DB_URL이 있으면 Render 서버의 설정을 쓰고, 없으면 Aiven 기본 주소를 사용합니다.
spring.datasource.url=${DB_URL:jdbc:mysql://mysql-148e1bac-idontlivealone.g.aivencloud.com:14640/defaultdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=true&trustServerCertificate=true}

# 환경변수 DB_USERNAME이 있으면 사용하고, 없으면 Aiven 기본 유저(avnadmin)를 사용합니다.
spring.datasource.username=${DB_USERNAME:avnadmin}

# [중요] Render 대시보드의 Environment 탭에서 Key를 'DB_PASSWORD'로 하고 값을 입력해야 작동합니다.
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# DB 연결 시도 시간을 최대 30초(30000ms)로 지정
spring.datasource.hikari.connection-timeout=30000

# DB 연결 실패 시 서버 구동을 아예 실패(종료)시켜 에러 추적 용이하게 변경
spring.datasource.continue-on-error=false


# ===================================================================
# 3. JPA / 하이버네이트(Hibernate) 설정
# ===================================================================
# 테이블 구조 자동 업데이트 (Aiven DB에 비어있는 테이블들을 스프링부트가 자동으로 생성)
spring.jpa.hibernate.ddl-auto=update

# 하이버네이트가 JDBC 메타데이터 없이도 완벽하게 구동되도록 MySQL 방언을 강제 지정합니다.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL 실행 로그 및 포맷팅 설정
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
