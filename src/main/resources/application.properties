# ===================================================================
# 1. 애플리케이션 기본 설정
# ===================================================================
spring.application.name=smart_door_security_server

# 외부 요청 수신 및 플랫폼 포트 강제 바인딩
server.port=${PORT:8080}
server.address=0.0.0.0

# 파일 및 요청 용량 설정
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB


# ===================================================================
# 2. 데이터베이스(Database) 및 히카리CP(HikariCP) 설정
# ===================================================================
# DB 연결 URL 설정 (판다스택 전용 SSL 필수 옵션 및 인코딩 추가)
spring.datasource.url=jdbc:mysql://idontlivealone-c7340c.db.pandastack.app:3306/mysql?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=true&requireSSL=true

# 사용자 이름 및 비밀번호 설정 (뿌리 = root)
spring.datasource.username=root
spring.datasource.password=T6ZbVuSDpqgEXTp1I8yTooCc

# MySQL 드라이버 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# DB 연결 시도 시간을 최대 30초(30000ms)로 늘려 네트워크 물리적 거리를 극복
spring.datasource.hikari.connection-timeout=30000

# DB 연결 실패 시 서버 구동을 아예 실패(종료)시켜 에러 추적 용이하게 변경
spring.datasource.continue-on-error=false


# ===================================================================
# 3. JPA / 하이버네이트(Hibernate) 설정
# ===================================================================
# 테이블 구조 자동 업데이트
spring.jpa.hibernate.ddl-auto=update

# SQL 실행 로그 및 포맷팅 설정
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
